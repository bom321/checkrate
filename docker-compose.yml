services:
  checkrate:
    build: .
    container_name: checkrate
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Bangkok
      - DATA_DIR=/data
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      # host path ปรับได้ผ่าน HOST_DATA_DIR ใน .env (ค่าเริ่มต้น /volume1/deposit-rate)
      - "${HOST_DATA_DIR:-/volume1/deposit-rate}:/data"
